<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https: data:; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://rlunygzxvpldfaanhxnj.supabase.co;" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Yumiko Overlay</title>
  <link rel="stylesheet" href="./widget.css" />
</head>
<body>
  <button id="quit-app" class="floating-quit" aria-label="Cerrar app">✕</button>

  <section class="yumiko-widget" id="yumiko-widget" data-mode="focus" aria-live="polite">
    <div id="drag-region" class="drag-region" aria-hidden="true"></div>

    <div id="yumiko-mini" class="yumiko-mini" aria-hidden="false">
      <div id="mini-wrap" class="mini-wrap">
        <img
          id="yumiko-character"
          src="https://rlunygzxvpldfaanhxnj.supabase.co/storage/v1/object/public/cosas%20de%2021-moon/fase-1.png"
          alt="Yumiko"
        />

        <div class="mini-actions" role="group" aria-label="Controles rápidos">
          <button id="mini-mic" class="mini-btn" type="button" aria-label="Micrófono">🎤</button>
          <button id="mini-chat" class="mini-btn" type="button" aria-label="Abrir chat">💬</button>
        </div>
      </div>
    </div>

    <div class="yumiko-chat" id="yumiko-chat" hidden>
      <button id="toggle-settings" class="panel-settings-btn" type="button" aria-label="Abrir settings">⚙️</button>

      <div id="settings-panel" class="panel" hidden>
        <div class="toggle-row">
          <label for="overlay-enabled">Modo Overlay (Siempre arriba)</label>
          <input id="overlay-enabled" type="checkbox" />
        </div>
        <div class="toggle-row">
          <label for="click-through-enabled">Click-through (dejar pasar clicks)</label>
          <input id="click-through-enabled" type="checkbox" />
        </div>
        <div class="toggle-row">
          <label for="shortcuts-enabled">Atajos globales</label>
          <input id="shortcuts-enabled" type="checkbox" />
        </div>
        <div class="auth-row">
          <span id="auth-status" class="auth-status">No conectado</span>
          <button id="auth-action" class="panel-btn" type="button">Vincular</button>
        </div>
      </div>

      <div id="chat-log" class="chat-log" aria-live="polite"></div>

      <div class="chat-compose">
        <label class="sr-only" for="yumiko-input">Mensaje para Yumiko</label>
        <input id="yumiko-input" type="text" autocomplete="off" placeholder="Escribí tu mensaje..." />
        <button id="yumiko-send" class="icon-btn send-btn" type="button" aria-label="Enviar">Enviar</button>
      </div>
    </div>
  </section>

  <script src="./renderer.js"></script>
  <script src="./widget.js"></script>
</body>
</html>
