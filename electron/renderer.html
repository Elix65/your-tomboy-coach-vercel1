<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https: data:; script-src 'self'; style-src 'self' 'unsafe-inline';" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Yumiko Overlay</title>
  <link rel="stylesheet" href="./widget.css">
  <style>
    * { box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #0f0f12;
      color: #f5f6fb;
      font-family: Inter, "Segoe UI", Roboto, Arial, sans-serif;
    }
    body {
      display: flex;
      flex-direction: column;
      border: 1px solid #292a30;
      border-radius: 14px;
    }
    button, a, input, select, textarea { -webkit-app-region: no-drag; }
    .bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 8px 10px;
      background: #17181d;
      border-bottom: 1px solid #2d2d32;
      -webkit-app-region: drag;
    }
    .title {
      font-weight: 600;
      font-size: 12px;
      letter-spacing: 0.02em;
    }
    .actions {
      display: flex;
      gap: 8px;
      -webkit-app-region: no-drag;
    }
    .panel-btn {
      border: 1px solid #3a3b44;
      background: #22242c;
      color: #f6f6f7;
      border-radius: 8px;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 12px;
      line-height: 1;
    }
    .close-btn {
      width: 28px;
      padding: 6px 0;
      text-align: center;
      font-weight: 700;
    }
    .panel {
      display: none;
      background: #191a20;
      border-bottom: 1px solid #2d2d32;
      padding: 12px;
    }
    .panel.open { display: block; }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      font-size: 13px;
      gap: 12px;
    }
    .toggle-row label { flex: 1; }
    .content {
      position: relative;
      flex: 1;
      min-height: 0;
      display: flex;
      padding: 14px;
      overflow-y: auto;
      background: radial-gradient(circle at top right, #1f2230 0%, #121318 42%, #0d0e12 100%);
    }
    .local-widget {
      width: 100%;
      border-radius: 14px;
      border: 1px solid #353744;
      background: rgba(17, 19, 26, 0.78);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 12px;
      text-align: center;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
    }
    .local-widget.focus {
      border-color: #6c90ff;
      box-shadow: 0 8px 28px rgba(83, 130, 255, 0.24);
    }
    .local-image {
      width: min(100%, 240px);
      max-height: 120px;
      object-fit: cover;
      border-radius: 12px;
      border: 1px solid #434657;
    }
    .safe-image-fallback {
      display: none;
      width: min(100%, 240px);
      min-height: 120px;
      border-radius: 12px;
      border: 1px solid #434657;
      background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 45%, #ec4899 100%);
      color: #ffffff;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.35);
      padding: 12px;
    }
    .safe-image-fallback.visible {
      display: flex;
    }
    .status-message {
      margin: 0;
      font-size: 12px;
      color: #b8c1da;
    }
    .local-mode {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #9ca3b4;
      margin: 0;
    }
    .local-title {
      font-size: 17px;
      line-height: 1.25;
      font-weight: 600;
      margin: 0;
    }
    .welcome {
      position: absolute;
      inset: 0;
      background: rgba(11, 12, 17, 0.92);
      backdrop-filter: blur(2px);
      z-index: 5;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 10px;
      padding: 18px;
      overflow-y: auto;
    }
    .welcome h1 { margin: 0; font-size: 18px; }
    .welcome p { margin: 0; color: #d1d1d1; font-size: 13px; line-height: 1.5; }
    .welcome button {
      border: 1px solid #4d4d4d;
      background: #242424;
      color: #fff;
      border-radius: 10px;
      padding: 10px;
      cursor: pointer;
      text-align: left;
    }
    .welcome .secondary {
      text-align: center;
      background: transparent;
    }
  </style>
</head>
<body>
  <div class="bar">
    <div class="title">Yumiko Overlay</div>
    <div class="actions">
      <button id="toggle-settings" class="panel-btn">Settings</button>
      <button id="quit-app" class="panel-btn close-btn" aria-label="Cerrar app">X</button>
    </div>
  </div>

  <div id="settings-panel" class="panel">
    <div class="toggle-row">
      <label for="overlay-enabled">Modo Overlay (Siempre arriba)</label>
      <input id="overlay-enabled" type="checkbox" />
    </div>
    <div class="toggle-row">
      <label for="click-through-enabled">Click-through (dejar pasar clicks)</label>
      <input id="click-through-enabled" type="checkbox" />
    </div>
    <div class="toggle-row">
      <label for="shortcuts-enabled">Atajos globales</label>
      <input id="shortcuts-enabled" type="checkbox" />
    </div>
  </div>

  <div class="content">
    <div id="welcome" class="welcome" hidden>
      <h1>Bienvenido a Yumiko Overlay</h1>
      <p>
        Esta app inicia en modo seguro: ventana normal, sin click-through y sin atajos globales.
        Puedes activar opciones avanzadas cuando quieras.
      </p>
      <button id="welcome-overlay">Activar modo Overlay</button>
      <button id="welcome-shortcuts">Activar atajos (opcional)</button>
      <button id="welcome-clickthrough">Activar click-through (opcional)</button>
      <button id="welcome-continue" class="secondary">Continuar</button>
    </div>

  </div>

  <script src="./renderer.js"></script>
  <script defer src="./widget.js"></script>

  <section class="yumiko-widget" id="yumiko-widget" data-mode="focus" aria-live="polite" hidden>
    <button id="yumiko-bubble" class="yumiko-bubble" type="button" aria-label="Abrir chat con Yumiko">
      ¿Me contás qué hacés?
    </button>

    <div class="yumiko-chat" id="yumiko-chat" hidden>
      <label class="sr-only" for="yumiko-input">Mensaje para Yumiko</label>
      <input id="yumiko-input" type="text" autocomplete="off" placeholder="Estoy haciendo...">
      <button id="yumiko-mic" class="icon-btn" type="button" aria-label="Micrófono">🎤</button>
      <button id="yumiko-send" class="icon-btn send-btn" type="button" aria-label="Enviar">➤</button>
    </div>

    <button id="yumiko-avatar" class="yumiko-avatar" type="button" aria-label="Cambiar entre focus y chat">
      <img src="https://rlunygzxvpldfaanhxnj.supabase.co/storage/v1/object/public/cosas%20de%2021-moon/hi-4.png" alt="Yumiko">
    </button>
  </section>
</body>
</html>
