<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yumiko Widget</title>
  <link rel="stylesheet" href="./widget.css">
</head>
<body>
  <div class="yumiko-widget" id="yumiko-widget" data-mode="focus" aria-live="polite">
    <button id="yumiko-avatar" class="yumiko-avatar" type="button" aria-label="Cambiar modo de Yumiko">
      <img src="https://rlunygzxvpldfaanhxnj.supabase.co/storage/v1/object/public/cosas%20de%2021-moon/fase-1.png" alt="Yumiko">
    </button>

    <button id="yumiko-bubble" class="yumiko-bubble" type="button">¿Me contás qué hacés?</button>

    <div class="yumiko-chat" id="yumiko-chat" hidden>
      <label for="yumiko-input" class="sr-only">Mensaje para Yumiko</label>
      <input id="yumiko-input" type="text" placeholder="Estoy haciendo..." autocomplete="off">
      <button id="yumiko-send" type="button">Enviar</button>
    </div>
  </div>

  <script src="./widget.js"></script>
</body>
</html>
