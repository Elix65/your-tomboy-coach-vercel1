<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrada reservada | 21-Moon</title>
  <link rel="icon" type="image/png" href="https://rlunygzxvpldfaanhxnj.supabase.co/storage/v1/object/public/cosas%20de%2021-moon/hi-4.png?v=1">
  <link rel="apple-touch-icon" href="https://rlunygzxvpldfaanhxnj.supabase.co/storage/v1/object/public/cosas%20de%2021-moon/hi-4.png?v=1">
  <link rel="stylesheet" href="/style.v2.css">
  <link rel="stylesheet" href="/login.v2.css">
</head>
<body class="login-page member-login-page">
  <div class="login-root">
    <div class="bg-scene" aria-hidden="true"></div>
    <div class="yumiko-layer" aria-hidden="true">
      <img
        class="yumiko-figure"
        src="https://rlunygzxvpldfaanhxnj.supabase.co/storage/v1/object/public/cosas%20de%2021-moon/fase-1.png"
        alt="">
    </div>

    <div class="auth-shell">
      <div class="auth-left">
        <div id="login-container" class="member-login-container">
          <div class="panel-ornament" aria-hidden="true"></div>
          <div class="login-brand" aria-hidden="true">
            <img src="/svg/moon-sakura-logo.svg" alt="" class="login-brand-logo">
            <span class="login-brand-text">21-Moon</span>
          </div>

          <div class="invitation-status-pill" data-state="ready">
            <span>Entrada reservada</span>
          </div>

          <div class="invitation-copy-block">
            <p class="login-eyebrow">Miembros</p>
            <h2 class="login-title">Volvé a entrar sin desviar la mirada.</h2>
            <p class="login-subtitle">Esta puerta es solo para quienes ya tienen su acceso sellado.</p>
          </div>

          <div class="invitation-section invitation-section--focus">
            <div class="invitation-section-copy">
              <p class="section-kicker">Acceso de miembros</p>
              <p class="section-note">Email y contraseña. Nada más en medio.</p>
            </div>

            <form id="member-signin-form" class="arrival-auth-form" novalidate>
              <label for="member-email" class="arrival-label">Email</label>
              <div class="input-wrap email-wrap">
                <span class="input-icon" aria-hidden="true"></span>
                <input id="member-email" type="email" placeholder="tu@email.com" autocomplete="email" aria-label="Email">
              </div>

              <label for="member-password" class="arrival-label">Contraseña</label>
              <div class="input-wrap password-wrap">
                <span class="input-icon" aria-hidden="true"></span>
                <input id="member-password" type="password" placeholder="••••••••" autocomplete="current-password" aria-label="Contraseña">
              </div>

              <button id="btn-member-signin" class="login-btn" type="submit">Entrar al salón</button>
            </form>
          </div>

          <p id="login-error" class="login-error hidden" role="status" aria-live="polite"></p>
        </div>

        <p class="private-access-hint">Si todavía no recibiste tu invitación, podés volver a <a class="text-link" href="/login.html">la llegada pública</a>.</p>
      </div>
    </div>
  </div>

  <div id="pageTransition" class="page-transition" aria-hidden="true">
    <div class="page-transition-bg"></div>
    <img id="runner" class="runner"
         src="https://rlunygzxvpldfaanhxnj.supabase.co/storage/v1/object/public/cosas%20de%2021-moon/run-1.png"
         alt="">
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/transition.v2.js"></script>
  <script type="module" src="/auth.v2.js"></script>
</body>
</html>
