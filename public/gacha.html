<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gacha de Yumiko</title>
  <link rel="stylesheet" href="/style.v2.css">
  <link rel="stylesheet" href="/gacha.v2.css">
</head>

<body>

  <!-- BOTÓN HAMBURGUESA (solo mobile) -->
  <div id="hamburger-btn" class="hamburger hidden">
    <div></div>
    <div></div>
    <div></div>
  </div>

  <!-- MENÚ LATERAL MOBILE -->
  <div id="mobile-menu-overlay" class="mobile-menu-overlay hidden">
    <div class="mobile-menu-drawer">
      <button id="m-inventario" class="mobile-menu-btn">Inventario</button>
      <button id="m-inicio" class="mobile-menu-btn">Inicio</button>
      <button id="m-audios" class="mobile-menu-btn">🎧 Audios tsundere 😳</button>
      <button id="m-logout" class="mobile-menu-btn logout">Cerrar sesión</button>
    </div>
  </div>

  <!-- TOP BAR (DESKTOP) -->
  <div class="top-bar hidden" id="top-bar">
    <button id="btn-inventario" class="top-btn">Inventario</button>
    <button id="btn-inicio" class="top-btn">Inicio</button>
    <button id="btn-audios" class="top-btn">
      <span class="audios-label--desktop">N-no es que me importes… pero vení, b-baka 😳</span>
      <span class="audios-label--mobile">🎧 Audios tsundere 😳</span>
    </button>
    <button id="btn-logout" class="top-btn">Cerrar sesión</button>
  </div>

  <!-- CAPAS DE FONDO -->
  <div class="layer layer-wood"></div>
  <div class="layer layer-shoji"></div>
  <div class="layer layer-pattern"></div>

  <div class="container" id="gacha-container">

    <!-- HEADER -->
    <div class="header">
      <img src="/varios/yumiko/yumiko-face-full-face.png" class="avatar-header">
      <h1 class="title">Gacha de Yumiko</h1>
    </div>

    <p class="subtitle">Prueba tu suerte, discípulo</p>

    <!-- SELECTOR DE MODO -->
  <div class="gacha-mode">
    <button id="mode-comun" class="mode-btn active">Común</button>
    <button id="mode-premium" class="mode-btn">Premium</button>
    <span id="premium-balance" class="premium-balance hidden">Premium: --</span>
  </div>
  <div class="recharge-row">
  <select id="pack-select" class="pack-select">
    <option value="55">55 Yumiko Coins</option>
    <option value="111">111 Yumiko Coins</option>
    <option value="333">333 Yumiko Coins</option>
  </select>
  <button id="btn-recharge" class="recharge-btn">Recargar</button>
</div>

    <!-- BOTONES -->
    <div class="gacha-buttons">
      <button id="btn-tirar-1">Tirar 1</button>
      <button id="btn-tirar-10">Tirar x10</button>
    </div>

    <!-- RESULTADOS -->
    <div id="gacha-resultados">
      <p style="opacity:0.7;">Aquí aparecerán tus resultados…</p>
    </div>

  </div>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- Lógica global (menú, sesión, navegación) -->
<script type="module" src="./auth.v2.js"></script>
<script type="module" src="./script.v2.js"></script>
<!-- Lógica del gacha -->

<script type="module" src="./gacha.v2.js"></script>


</body>
</html>
