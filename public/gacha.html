<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gacha de Yumiko</title>
  <link rel="icon" type="image/png" href="https://rlunygzxvpldfaanhxnj.supabase.co/storage/v1/object/public/cosas%20de%2021-moon/hi-4.png?v=1">
  <link rel="apple-touch-icon" href="https://rlunygzxvpldfaanhxnj.supabase.co/storage/v1/object/public/cosas%20de%2021-moon/hi-4.png?v=1">
  <link rel="stylesheet" href="/style.v2.css">
  <link rel="stylesheet" href="/gacha.v2.css">
</head>

<body>

  <!-- BOTÓN HAMBURGUESA (solo mobile) -->
  <div id="hamburger-btn" class="hamburger hidden">
    <div></div>
    <div></div>
    <div></div>
  </div>

  <!-- MENÚ LATERAL MOBILE -->
  <div id="mobile-menu-overlay" class="mobile-menu-overlay hidden">
    <div class="mobile-menu-drawer">
      <button id="m-inventario" class="mobile-menu-btn">Inventario</button>
      <button id="m-inicio" class="mobile-menu-btn">Inicio</button>
      <button id="m-audios" class="mobile-menu-btn">🎧 Audios tsundere 😳</button>
      <button id="m-logout" class="mobile-menu-btn logout">Cerrar sesión</button>
    </div>
  </div>

  <!-- TOP BAR (DESKTOP) -->
  <div class="top-bar hidden" id="top-bar">
    <div class="nav-actions">
      <div class="nav-inventory">
        <button id="btn-inventario" class="top-btn">Inventario</button>
        <div id="inventoryDropdown" class="inventory-dropdown" aria-hidden="true">
          <aside id="inventoryPanel" class="inventory-panel" aria-hidden="true">
            <button id="inventory-close-btn" class="inventory-close-btn" type="button">Cerrar</button>
            <div id="inventory-content" class="inventory-content">
              <p style="color:#ccc">Cargando...</p>
            </div>
          </aside>
        </div>
      </div>
      <button id="btn-inicio" class="top-btn">Inicio</button>
      <button id="btn-audios" class="top-btn">
        <span class="audios-label--desktop">N-no es que me importes… pero vení, b-baka 😳</span>
        <span class="audios-label--mobile">🎧 Audios tsundere 😳</span>
      </button>
      <button id="btn-yumiko-100" class="top-btn yumiko-100-btn hidden" type="button">Yumiko 100%</button>
      <button id="btn-logout" class="top-btn">Cerrar sesión</button>
    </div>
  </div>

  <!-- CAPAS DE FONDO -->
  <div class="layer layer-wood"></div>
  <div class="layer layer-shoji"></div>
  <div class="layer layer-pattern"></div>

  <div id="appLayout" class="layout">
    <main id="chatContainer" class="chat-container">
      <div class="container" id="gacha-container">
        <div class="gacha-ui">
          <!-- HEADER -->
          <div class="header">
            <h1 class="title">Gacha de Yumiko</h1>
          </div>

          <p class="subtitle">Prueba tu suerte, discípulo</p>

          <header class="gacha-top">
            <!-- SELECTOR DE MODO -->
            <div class="gacha-mode" role="tablist" aria-label="Modo gacha">
              <button id="mode-comun" class="mode-btn active is-active" role="tab" aria-selected="true">Común</button>
              <button id="mode-premium" class="mode-btn" role="tab" aria-selected="false">Premium</button>
            </div>

            <div class="coins-pill" aria-live="polite">
              <span class="coin-icon" aria-hidden="true">◉</span>
              <span id="coins-label">-- Yumiko Coins</span>
              <span class="coin-separator" aria-hidden="true"></span>
              <span class="coin-plus" aria-hidden="true">+</span>
            </div>

            <div class="recharge-row">
              <select id="pack-select" class="pack-select">
                <option value="55">55 Yumiko Coins</option>
                <option value="111">111 Yumiko Coins</option>
                <option value="333">333 Yumiko Coins</option>
              </select>
              <button id="btn-recharge" class="recharge-btn">Recargar</button>
            </div>
          </header>

          <section class="gacha-actions">
            <!-- BOTONES -->
            <div class="gacha-buttons">
              <button id="btn-tirar-1" class="cta-primary">
                <span class="cta-title">🂠 Tirar 1</span>
                <span class="cost-chip">5 ◉</span>
              </button>
              <button id="btn-tirar-10" class="cta-secondary">Tirar x10</button>
            </div>

            <p class="guarantee-text">¡10 invocaciones +1 lanzamiento garantizado raro!</p>
            <span id="premium-balance" class="premium-balance hidden">Premium: --</span>
          </section>

          <section class="gacha-results">
            <!-- RESULTADOS -->
            <div id="gacha-resultados" class="results-grid">
              <p style="opacity:0.7;">Aquí aparecerán tus resultados…</p>
            </div>
          </section>
        </div>
      </div>
    </main>
  </div>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- Transición entre páginas -->
<script src="/transition.v2.js"></script>

<!-- Lógica global (menú, sesión, navegación) -->
<script type="module" src="./auth.v2.js"></script>
<script type="module" src="./ui.v2.js"></script>
<!-- Lógica del gacha -->

<script type="module" src="./gacha.v2.js"></script>


  <div id="pageTransition" class="page-transition" aria-hidden="true">
    <div class="page-transition-bg"></div>
    <img id="runner" class="runner"
         src="https://rlunygzxvpldfaanhxnj.supabase.co/storage/v1/object/public/cosas%20de%2021-moon/run-1.png"
         alt="">
  </div>

  <div id="gacha-ritual" class="ritual hidden" aria-hidden="true">
    <div class="ritual-card">
      <div class="ritual-title">Yumiko está tirando…</div>
      <div class="ritual-sub">No mires, b-baka 😳</div>
      <div class="ritual-spinner" aria-hidden="true"></div>
    </div>
  </div>

</body>
</html>
