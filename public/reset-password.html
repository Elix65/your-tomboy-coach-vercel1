<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nueva contraseña</title>
  <link rel="icon" type="image/png" href="https://rlunygzxvpldfaanhxnj.supabase.co/storage/v1/object/public/cosas%20de%2021-moon/hi-4.png?v=1">
  <link rel="apple-touch-icon" href="https://rlunygzxvpldfaanhxnj.supabase.co/storage/v1/object/public/cosas%20de%2021-moon/hi-4.png?v=1">
  <link rel="stylesheet" href="/style.v2.css">
  <link rel="stylesheet" href="/login.v2.css">
</head>
<body>
  <div id="login-container">
    <h2 class="login-title">Nueva contraseña</h2>
    <p class="login-copy">Elige una nueva contraseña. Prometo no mirar… 😳</p>
    <p class="login-copy">Mínimo 8 caracteres.</p>

    <input id="new-password" type="password" placeholder="Nueva contraseña" autocomplete="new-password">
    <input id="confirm-password" type="password" placeholder="Confirmar contraseña" autocomplete="new-password">

    <button id="btn-save-password" class="login-btn" type="button">Guardar contraseña</button>
    <p id="reset-message" class="login-error hidden"></p>
    <a id="back-to-login" class="text-link hidden" href="/login.html">Volver al login</a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="/reset-password.js"></script>
</body>
</html>
