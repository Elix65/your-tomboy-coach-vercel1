<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comienza tu Entrenamiento con Yumiko</title>
  <link rel="stylesheet" href="/style.v2.css">
</head>

<body>

  <!-- BOTÓN HAMBURGUESA (solo mobile) -->
  <div id="hamburger-btn" class="hamburger hidden">
    <div></div>
    <div></div>
    <div></div>
  </div>

  <!-- MENÚ LATERAL MOBILE -->
  <div id="mobile-menu-overlay" class="mobile-menu-overlay hidden">
    <div class="mobile-menu-drawer">
      <button id="m-inventario" class="mobile-menu-btn">Inventario</button>
      <button id="m-gacha" class="mobile-menu-btn">Gacha</button>
      <button id="m-audios" class="mobile-menu-btn">🎧 Audios tsundere 😳</button>
      <button id="m-logout" class="mobile-menu-btn logout">Cerrar sesión</button>
    </div>
  </div>

  <div id="entry-choice-modal" class="choice-overlay hidden" aria-hidden="true" inert>
    <div class="choice-card" role="dialog" aria-modal="true" aria-labelledby="choice-title">
      <button id="choice-close" class="choice-close" aria-label="Cerrar">×</button>
      <h2 id="choice-title" class="choice-title">¿Qué querés hoy?</h2>
      <p class="choice-subtitle">Elegí tu camino con Yumiko ✨</p>
      <div class="choice-actions">
        <button id="choice-chat" class="choice-btn choice-btn-primary">💬 Chatear con Yumiko</button>
        <button id="choice-audios" class="choice-btn choice-btn-secondary">🎧 Audios (mañana, tarde y noche)</button>
      </div>
    </div>
  </div>

  <!-- TOP BAR (DESKTOP) -->
  <div class="top-bar hidden" id="top-bar">
    <div class="nav-actions">
      <button id="btn-inventario" class="top-btn">Inventario</button>
      <button id="btn-gacha" class="top-btn">Gacha</button>
      <button id="btn-audios" class="top-btn top-btn-primary">
        <span class="audios-label--desktop">N-no es que me importes… pero vení, b-baka 😳</span>
        <span class="audios-label--mobile">🎧 Audios tsundere 😳</span>
      </button>
      <button id="btn-logout" class="top-btn">Cerrar sesión</button>
    </div>
  </div>

  <!-- entrada cinematica -->
  <div class="cinematic-overlay"></div>

  <!-- CAPAS DE FONDO -->
  <div class="layer layer-wood"></div>
  <div class="layer layer-shoji"></div>
  <div class="layer layer-pattern"></div>

  <!-- VIÑETA ANIME -->
  <div class="vignette"></div>
  <div class="glow-yumiko"></div>
  <div class="particles-anime"></div>
  <div class="aura-yumiko"></div>

  <div id="appLayout" class="layout">
    <aside id="inventoryPanel" class="inventory-panel" aria-hidden="true">
      <button id="inventory-close-btn" class="inventory-close-btn" type="button">Cerrar</button>
      <div id="inventory-content" class="inventory-content">
        <p style="color:#ccc">Cargando...</p>
      </div>
    </aside>

    <!-- CONTENIDO -->
    <main id="chatContainer" class="chat-container">
      <div class="container">

      <!-- DOJO UI (ya no hay login aquí) -->
      <div id="dojo-ui">

      <div class="header">
        <h1 class="title title-cinematic">Your coach Yumiko</h1>
      </div>

      <p class="subtitle">El Dojo Despierta Contigo</p>

      <div class="chat-frame-wrap">
        <div class="chat-messages-area">
          <div id="chat-box" class="chat-box">
            <div id="yumiko-bg"></div>
          </div>
        </div>

        <div class="chat-composer-area">
          <div id="typing" class="typing hidden">
            <img src="/varios/yumiko/yumiko-face-full-face.png" class="avatar-small">
            <span>Yumiko está escribiendo…</span>
          </div>

          <!-- INPUT + BOTONES -->
          <div class="input-area">
            <input id="user-input" type="text" name="chat-message" placeholder="Escribe aquí..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
            <button id="send-btn">Enviar</button>

            <div class="extra-buttons">
              <button id="regenerate-btn" class="dojo-btn">Regenerar</button>
              <button id="reset-chat" class="dojo-btn">Reiniciar Chat</button>
            </div>
          </div>
        </div>
      </div>

      </div> <!-- cierre dojo-ui -->

      </div> <!-- cierre container -->
    </main>
  </div>

  <!-- AUDIO -->
  <audio id="ambience-intro" src="/varios/musica/ambiente-inicial.mp3" preload="auto"></audio>
  <audio id="ambience-loop" src="/varios/musica/ambiente-bucle.mp3" preload="auto" loop></audio>
  <audio id="yumiko-sound" src="/varios/musica/doing.mp3"></audio>

  <!-- SUPABASE -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- LÓGICA PRINCIPAL DEL DOJO -->
<script type="module" src="/auth.v2.js"></script>
<script type="module" src="/script.v2.js"></script>
<script src="/yumiko-return-nudges.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    const choiceModal = document.getElementById("entry-choice-modal");
    const choiceClose = document.getElementById("choice-close");
    const choiceChat = document.getElementById("choice-chat");
    const choiceAudios = document.getElementById("choice-audios");

    if (!choiceModal) {
      return;
    }

    const focusSafeTarget = () => {
      const safeTarget = document.getElementById("user-input") || document.body;

      if (safeTarget === document.body) {
        document.body.setAttribute("tabindex", "-1");
      }

      safeTarget.focus({ preventScroll: true });
    };

    const openChoiceModal = () => {
      choiceModal.classList.remove("hidden");
      choiceModal.inert = false;
      choiceModal.setAttribute("aria-hidden", "false");
      choiceChat?.focus({ preventScroll: true });
    };

    const closeChoiceModal = () => {
      const activeElement = document.activeElement;

      if (activeElement && typeof activeElement.blur === "function") {
        activeElement.blur();
      }

      choiceModal.classList.add("hidden");
      choiceModal.inert = true;

      focusSafeTarget();
      choiceModal.setAttribute("aria-hidden", "true");
    };

    if (sessionStorage.getItem("show_entry_choice") === "1") {
      sessionStorage.removeItem("show_entry_choice");
      openChoiceModal();
    } else {
      choiceModal.classList.add("hidden");
      choiceModal.inert = true;
      choiceModal.setAttribute("aria-hidden", "true");
    }

    choiceClose?.addEventListener("click", closeChoiceModal);
    choiceChat?.addEventListener("click", closeChoiceModal);

    choiceAudios?.addEventListener("click", () => {
      window.location.href = "/pacto-lunar-voz-triunfante.html";
    });

    choiceModal.addEventListener("click", (event) => {
      if (event.target === choiceModal) {
        closeChoiceModal();
      }
    });
  });
</script>

</body>
</html>
