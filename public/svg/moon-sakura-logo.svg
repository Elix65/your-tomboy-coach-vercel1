  </g>
  <g transform="translate(101 15) scale(0.74)" opacity="0.84">
    <use href="#sakura"/>
  </g>
  <g transform="translate(112 34) scale(0.62)" opacity="0.72">
    <use href="#sakura"/>
  </g>

  <use href="#petal" transform="translate(73 35) rotate(-22) scale(0.88)" opacity="0.55"/>
  <use href="#petal" transform="translate(90 44) rotate(14) scale(0.7)" opacity="0.47"/>
  <use href="#petal" transform="translate(106 46) rotate(-9) scale(0.62)" opacity="0.42"/>
  <use href="#petal" transform="translate(118 8) rotate(33) scale(0.58)" opacity="0.36"/>
