<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Yumiko Dojo — Mentoría Anime</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- CAPAS DE FONDO -->
  <div class="layer layer-wood"></div>
  <div class="layer layer-shoji"></div>
  <div class="layer layer-pattern"></div>

  <!-- VIÑETA ANIME -->
  <div class="vignette"></div>
  <div class="glow-yumiko"></div>
  <div class="particles-anime"></div>
  <div class="aura-yumiko"></div>


  <!-- CONTENIDO -->
  <div class="container">

    <div class="header">
      <img src="https://copilot.microsoft.com/th/id/BCO.71c599d0-e7fb-4f35-aca0-f60954cec101.png" class="avatar-header">
      <h1 class="title">Your Coach Yumiko</h1>
    </div>

    <p class="subtitle">Bienvenido al Dojo — Día 1</p>

    <div id="chat-box" class="chat-box"></div>

    <div id="typing" class="typing hidden">
      <img src="https://copilot.microsoft.com/th/id/BCO.71c599d0-e7fb-4f35-aca0-f60954cec101.png" class="avatar-small">
      <span>Yumiko está escribiendo…</span>
    </div>

    <div class="input-area">
      <input id="user-input" type="text" placeholder="Escribe aquí..." autocomplete="off">
      <button id="send-btn">Enviar</button>
    </div>

  </div>
  <audio id="dojo-ambience" src="/sounds/dojo-ambience.mp3" loop></audio>
  <audio id="yumiko-sound" src="/sounds/yumiko-respond.mp3"></audio>

  <script src="script.js"></script>
</body>
</html>
