<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comienza tu Entrenamiento con Yumiko</title>
  <link rel="stylesheet" href="style.css">

</head>

<body> 
  <!-- BOTÓN DE LOGOUT -->
  <button id="btn-logout" class="logout-btn hidden">Cerrar sesión</button>
  <button><a href="/gacha.html">Ir al Gacha de Yumiko</a></button>
  <!-- entrada cinematica -->
  <div class="cinematic-overlay"></div>

  <!-- CAPAS DE FONDO -->
  <div class="layer layer-wood"></div>
  <div class="layer layer-shoji"></div>
  <div class="layer layer-pattern"></div>

  <!-- VIÑETA ANIME -->
  <div class="vignette"></div>
  <div class="glow-yumiko"></div>
  <div class="particles-anime"></div>
  <div class="aura-yumiko"></div>

  <!-- CONTENIDO -->
  <div class="container">

    <!-- FORMULARIO DE LOGIN / REGISTRO -->
    <div id="auth-container">
        <h2>Entrar al Dojo</h2>

        <input id="email" type="email" placeholder="Email" autocomplete="email" inputmode="email">
        <input id="password" type="password" placeholder="Contraseña">

        <button id="btn-register">Registrarse</button>
        <button id="btn-login">Iniciar sesión</button>
    </div>

    <!-- TODO EL DOJO AGRUPADO AQUÍ -->
    <div id="dojo-ui">

      <div class="header">
        <img src="varios/yumiko/yumiko-face-full-face.png" class="avatar-header">
        <h1 class="title title-cinematic">Your coach Yumiko</h1>
      </div>

      <p class="subtitle">El Dojo Despierta Contigo</p>

      <div id="chat-box" class="chat-box"></div>

      <div id="typing" class="typing hidden">
        <img src="varios/yumiko/yumiko-face-full-face.png" class="avatar-small">
        <span>Yumiko está escribiendo…</span>
      </div>

      <!-- INPUT + BOTONES -->
      <div class="input-area">
        <input id="user-input" type="text" name="chat-message" placeholder="Escribe aquí..." autocomplete="new-password" autocorrect="off" autocapitalize="off" spellcheck="false">
        <button id="send-btn">Enviar</button>

        <div class="extra-buttons">
          <button id="regenerate-btn" class="dojo-btn">Regenerar</button>
          <button id="reset-chat" class="dojo-btn">Reiniciar Chat</button>
        </div>
      </div>

    </div> <!-- cierre dojo-ui -->

  </div> <!-- cierre container -->

  <!-- AUDIO -->
  <audio id="ambience-intro" src="/varios/musica/ambiente-inicial.mp3" preload="auto"></audio>
  <audio id="ambience-loop" src="/varios/musica/ambiente-bucle.mp3" preload="auto" loop></audio>
  <audio id="yumiko-sound" src="/varios/musica/doing.mp3"></audio>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js" defer></script>
</body>
</html>
