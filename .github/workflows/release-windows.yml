name: Release Windows Overlay

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    env:
      NODE_OPTIONS: --dns-result-order=ipv4first
      NPM_CONFIG_FETCH_RETRIES: 5
      NPM_CONFIG_FETCH_RETRY_MINTIMEOUT: 20000
      NPM_CONFIG_FETCH_RETRY_MAXTIMEOUT: 120000
      NPM_CONFIG_AUDIT: "false"
      NPM_CONFIG_FUND: "false"
    defaults:
      run:
        working-directory: electron

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: electron/package-lock.json

      - name: Cache Electron and electron-builder
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.LOCALAPPDATA }}\electron\Cache
            ${{ env.LOCALAPPDATA }}\electron-builder\Cache
          key: ${{ runner.os }}-electron-cache-${{ hashFiles('electron/package-lock.json') }}

      - name: Install dependencies (retry)
        shell: pwsh
        run: |
          for ($i=1; $i -le 3; $i++) {
            npm ci --no-audit --no-fund
            if ($LASTEXITCODE -eq 0) { break }
            if ($i -eq 3) { exit 1 }
            Start-Sleep -Seconds (10 * $i)
          }

      - name: Configure optional code signing
        if: ${{ secrets.WIN_CSC_LINK != '' || secrets.CSC_LINK != '' }}
        shell: pwsh
        run: |
          $link = "${{ secrets.WIN_CSC_LINK }}"
          if ([string]::IsNullOrWhiteSpace($link)) {
            $link = "${{ secrets.CSC_LINK }}"
          }

          if (-not [string]::IsNullOrWhiteSpace($link)) {
            "WIN_CSC_LINK=$link" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            "CSC_LINK=$link" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }

      - name: Configure optional code signing password
        if: ${{ secrets.WIN_CSC_KEY_PASSWORD != '' || secrets.CSC_KEY_PASSWORD != '' }}
        shell: pwsh
        run: |
          $password = "${{ secrets.WIN_CSC_KEY_PASSWORD }}"
          if ([string]::IsNullOrWhiteSpace($password)) {
            $password = "${{ secrets.CSC_KEY_PASSWORD }}"
          }

          if (-not [string]::IsNullOrWhiteSpace($password)) {
            "WIN_CSC_KEY_PASSWORD=$password" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            "CSC_KEY_PASSWORD=$password" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }

      - name: Build Windows installer
        run: npm run build:win

      - name: Generate SHA256 checksums
        shell: pwsh
        run: |
          $assets = @(
            "Yumiko-Overlay-Setup.exe",
            "Yumiko-Overlay-Setup.zip"
          )

          $checksums = @()
          foreach ($asset in $assets) {
            $assetPath = Join-Path "dist" $asset
            if (-not (Test-Path $assetPath)) {
              throw "Missing expected artifact: $assetPath"
            }

            $hash = (Get-FileHash -Algorithm SHA256 -Path $assetPath).Hash.ToLower()
            $line = "$hash  $asset"
            Set-Content -Path "$assetPath.sha256" -Value $line -NoNewline
            $checksums += $line
          }

          $checksums | Set-Content -Path "dist/checksums.txt"

      - name: Upload installer to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}
          files: |
            electron/dist/*.exe
            electron/dist/*.zip
            electron/dist/*.sha256
            electron/dist/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
