name: Release Windows Overlay

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    env:
      NODE_OPTIONS: --dns-result-order=ipv4first
      NPM_CONFIG_FETCH_RETRIES: 5
      NPM_CONFIG_FETCH_RETRY_MINTIMEOUT: 20000
      NPM_CONFIG_FETCH_RETRY_MAXTIMEOUT: 120000
      NPM_CONFIG_AUDIT: "false"
      NPM_CONFIG_FUND: "false"
      WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
      CSC_LINK: ${{ secrets.CSC_LINK }}
      WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
    defaults:
      run:
        working-directory: electron

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: electron/package-lock.json

      - name: Cache Electron and electron-builder
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.LOCALAPPDATA }}\electron\Cache
            ${{ env.LOCALAPPDATA }}\electron-builder\Cache
          key: ${{ runner.os }}-electron-cache-${{ hashFiles('electron/package-lock.json') }}

      - name: Install dependencies (retry)
        shell: pwsh
        run: |
          for ($i=1; $i -le 3; $i++) {
            npm ci --no-audit --no-fund
            if ($LASTEXITCODE -eq 0) { break }
            if ($i -eq 3) { exit 1 }
            Start-Sleep -Seconds (10 * $i)
          }

      - name: Validate optional code signing certificate
        shell: pwsh
        run: |
          $link = "$env:WIN_CSC_LINK"
          if ([string]::IsNullOrWhiteSpace($link)) {
            $link = "$env:CSC_LINK"
          }

          if ([string]::IsNullOrWhiteSpace($link)) {
            Write-Host "Code signing disabled (no valid certificate provided)."
            "WIN_CSC_LINK=" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            "CSC_LINK=" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            "WIN_CSC_KEY_PASSWORD=" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            "CSC_KEY_PASSWORD=" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            exit 0
          }

          $isHttpUrl = $false
          try {
            $uri = [System.Uri]$link
            $isHttpUrl = $uri.IsAbsoluteUri -and ($uri.Scheme -in @('http', 'https'))
          } catch {
            $isHttpUrl = $false
          }

          $isLeafCertFile = $false
          if (-not $isHttpUrl) {
            $resolvedPath = Resolve-Path -LiteralPath $link -ErrorAction SilentlyContinue
            if ($resolvedPath) {
              $item = Get-Item -LiteralPath $resolvedPath.Path -ErrorAction SilentlyContinue
              if ($item -and -not $item.PSIsContainer) {
                $extension = [System.IO.Path]::GetExtension($item.Name)
                $isLeafCertFile = $extension -in @('.p12', '.pfx')
              }
            }
          }

          if (-not $isHttpUrl -and -not $isLeafCertFile) {
            Write-Host "Code signing disabled (no valid certificate provided)."
            "WIN_CSC_LINK=" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            "CSC_LINK=" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            "WIN_CSC_KEY_PASSWORD=" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            "CSC_KEY_PASSWORD=" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }

      - name: Build Windows installer
        run: npm run build:win

      - name: Build portable ZIP from win-unpacked
        shell: pwsh
        run: |
          $portableSource = Join-Path "dist" "win-unpacked"
          if (-not (Test-Path $portableSource)) {
            throw "Missing expected portable folder: $portableSource"
          }

          $portableZip = Join-Path "dist" "Yumiko-Overlay-Portable.zip"
          if (Test-Path $portableZip) {
            Remove-Item $portableZip -Force
          }

          Compress-Archive -Path "$portableSource\*" -DestinationPath $portableZip

      - name: Generate SHA256 for setup
        shell: pwsh
        run: |
          $setupAsset = "Yumiko-Overlay-Setup.exe"
          $setupPath = Join-Path "dist" $setupAsset
          if (-not (Test-Path $setupPath)) {
            throw "Missing expected artifact: $setupPath"
          }

          $hash = (Get-FileHash -Algorithm SHA256 -Path $setupPath).Hash.ToLower()
          Set-Content -Path "$setupPath.sha256" -Value "$hash  $setupAsset" -NoNewline

      - name: Upload installer to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}
          files: |
            electron/dist/Yumiko-Overlay-Setup.exe
            electron/dist/Yumiko-Overlay-Setup.exe.sha256
            electron/dist/Yumiko-Overlay-Portable.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
