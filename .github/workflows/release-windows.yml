name: Release Windows Overlay

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    env:
      NODE_OPTIONS: --dns-result-order=ipv4first
      NPM_CONFIG_FETCH_RETRIES: 5
      NPM_CONFIG_FETCH_RETRY_MINTIMEOUT: 20000
      NPM_CONFIG_FETCH_RETRY_MAXTIMEOUT: 120000
      NPM_CONFIG_AUDIT: "false"
      NPM_CONFIG_FUND: "false"
    defaults:
      run:
        working-directory: electron

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: electron/package-lock.json

      - name: Cache Electron and electron-builder
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.LOCALAPPDATA }}\electron\Cache
            ${{ env.LOCALAPPDATA }}\electron-builder\Cache
          key: ${{ runner.os }}-electron-cache-${{ hashFiles('electron/package-lock.json') }}

      - name: Install dependencies (retry)
        shell: pwsh
        run: |
          for ($i=1; $i -le 3; $i++) {
            npm ci --no-audit --no-fund
            if ($LASTEXITCODE -eq 0) { break }
            if ($i -eq 3) { exit 1 }
            Start-Sleep -Seconds (10 * $i)
          }

      - name: Build Windows artifacts (NSIS + ZIP)
        shell: pwsh
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run build:win

      - name: Normalize artifact names
        shell: pwsh
        run: |
          $distDir = "dist"
          $setupDest = Join-Path $distDir "Yumiko-Overlay-Setup.exe"
          $portableDest = Join-Path $distDir "Yumiko-Overlay-Portable.zip"

          $setupCandidate = Get-ChildItem -Path $distDir -Filter "*.exe" -File |
            Where-Object { $_.Name -notlike "*uninstaller*" } |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1

          if (-not $setupCandidate) {
            throw "Missing setup .exe artifact in $distDir"
          }

          if ($setupCandidate.Name -ne "Yumiko-Overlay-Setup.exe") {
            Move-Item -Path $setupCandidate.FullName -Destination $setupDest -Force
          }

          $portableCandidate = Get-ChildItem -Path $distDir -Filter "*.zip" -File |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1

          if (-not $portableCandidate) {
            throw "Missing portable .zip artifact in $distDir"
          }

          if ($portableCandidate.Name -ne "Yumiko-Overlay-Portable.zip") {
            Move-Item -Path $portableCandidate.FullName -Destination $portableDest -Force
          }

      - name: Generate SHA256 for setup
        shell: pwsh
        run: |
          $setupAsset = "Yumiko-Overlay-Setup.exe"
          $setupPath = Join-Path "dist" $setupAsset
          if (-not (Test-Path $setupPath)) {
            throw "Missing expected artifact: $setupPath"
          }

          $hash = (Get-FileHash -Algorithm SHA256 -Path $setupPath).Hash.ToLower()
          Set-Content -Path "$setupPath.sha256" -Value "$hash  $setupAsset" -NoNewline

      - name: Verify output artifacts
        shell: pwsh
        run: |
          Get-ChildItem -Path dist | Format-Table Name, Length, LastWriteTime -AutoSize

          if (-not (Test-Path "dist/Yumiko-Overlay-Setup.exe")) {
            throw "Missing dist/Yumiko-Overlay-Setup.exe"
          }

          if (-not (Test-Path "dist/Yumiko-Overlay-Portable.zip")) {
            throw "Missing dist/Yumiko-Overlay-Portable.zip"
          }

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}
          files: |
            electron/dist/Yumiko-Overlay-Setup.exe
            electron/dist/Yumiko-Overlay-Setup.exe.sha256
            electron/dist/Yumiko-Overlay-Portable.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
