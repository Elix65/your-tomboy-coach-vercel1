name: CI Windows Overlay

on:
  push:
    branches:
      - main

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      NODE_OPTIONS: --dns-result-order=ipv4first
      NPM_CONFIG_FETCH_RETRIES: 5
      NPM_CONFIG_FETCH_RETRY_MINTIMEOUT: 20000
      NPM_CONFIG_FETCH_RETRY_MAXTIMEOUT: 120000
      NPM_CONFIG_AUDIT: "false"
      NPM_CONFIG_FUND: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: electron/package-lock.json

      - name: Cache Electron and electron-builder
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.LOCALAPPDATA }}\electron\Cache
            ${{ env.LOCALAPPDATA }}\electron-builder\Cache
          key: ${{ runner.os }}-electron-cache-${{ hashFiles('electron/package-lock.json') }}

      - name: Debug lockfile resolution
        shell: pwsh
        run: |
          Write-Host "PWD:" (Get-Location).Path

          Write-Host "\nRoot files:"
          Write-Host "  package.json:" (Test-Path "package.json")
          Write-Host "  package-lock.json:" (Test-Path "package-lock.json")

          Write-Host "\nElectron files:"
          Write-Host "  electron/package.json:" (Test-Path "electron/package.json")
          Write-Host "  electron/package-lock.json:" (Test-Path "electron/package-lock.json")

          Write-Host "\nSearching for 'keytar' in root lockfile:"
          if (Test-Path "package-lock.json") {
            Select-String -Path "package-lock.json" -Pattern "keytar"
          } else {
            Write-Host "  package-lock.json not found in root"
          }

          Write-Host "\nSearching for 'keytar' in electron lockfile:"
          if (Test-Path "electron/package-lock.json") {
            Select-String -Path "electron/package-lock.json" -Pattern "keytar"
          } else {
            Write-Host "  electron/package-lock.json not found"
          }

      - name: Install dependencies (retry)
        shell: pwsh
        run: |
          for ($i=1; $i -le 3; $i++) {
            cd electron
            npm ci --no-audit --no-fund
            if ($LASTEXITCODE -eq 0) { break }
            if ($i -eq 3) { exit 1 }
            Start-Sleep -Seconds (10 * $i)
          }

      - name: Install native app dependencies
        shell: pwsh
        run: |
          cd electron
          npx electron-builder install-app-deps

      - name: Build Windows artifacts (NSIS + ZIP)
        shell: pwsh
        run: |
          cd electron
          npm run build:win

      - name: Verify NSIS + ZIP artifacts
        shell: pwsh
        run: |
          Get-ChildItem -Path dist | Format-Table Name, Length, LastWriteTime -AutoSize

          $setupArtifact = Get-ChildItem -Path dist -Filter "*.exe" -File |
            Where-Object { $_.Name -notlike "*uninstaller*" } |
            Select-Object -First 1
          if (-not $setupArtifact) {
            throw "Missing NSIS setup artifact (.exe)"
          }

          $zipArtifact = Get-ChildItem -Path dist -Filter "*.zip" -File |
            Select-Object -First 1
          if (-not $zipArtifact) {
            throw "Missing ZIP artifact (.zip)"
          }

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: yumiko-overlay-windows
          path: |
            electron/dist/*.exe
            electron/dist/*.zip
